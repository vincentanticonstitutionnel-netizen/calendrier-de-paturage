name: Keep Supabase alive

on:
  schedule:
    # Tous les lundis à 8h00 UTC (= 9h ou 10h en France selon l'heure d'été)
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Permet aussi le déclenchement manuel depuis l'onglet Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -fsS -o /dev/null -w "Ping OK : HTTP %{http_code}\n" \
            "https://rizodpcstivvaalmggpk.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 * * 1'  # Tous les lundis à 8h UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health endpoint
        run: |
          response=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            "https://rizodpcstivvaalmggpk.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.txt
          if [ "$response" != "200" ]; then
            echo "ERROR: expected HTTP 200, got $response"
            exit 1
          fi
          echo "✅ Ping OK"
